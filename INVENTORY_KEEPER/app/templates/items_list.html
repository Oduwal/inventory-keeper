{% extends "base.html" %}
{% block content %}
<h1>Items</h1>

<div class="row">
    <a class="button primary" href="/items/new">Add Item</a>
    <a class="button" href="/import">Import Items</a>
</div>

<table class="table">
    <thead>
        <tr>
            <th>Name</th>
            <th>Stock</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        {% for item, stock in rows %}
        <tr>
            <td>{{ item.name }}</td>
            <td>{{ stock }}</td>
            <td>
                <form method="post" action="/items/{{ item.id }}/delete" style="display:inline;">
                    <button class="danger" type="submit" onclick="return confirm('Delete this item?');">
                        Delete
                    </button>
                </form>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
