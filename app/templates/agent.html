{% extends "base.html" %}
{% block content %}
<h1>Agents</h1>

<div class="card">
    <h2>Create Agent</h2>
    <form class="form" method="post" action="/agents/new">
        <label>Username</label><input name="username" required />
        <label>Password</label><input name="password" type="password" required />
        <label>Full name</label><input name="full_name" />
        <label>Phone</label><input name="phone" />
        <button class="primary" type="submit">Create Agent</button>
    </form>
</div>

<div class="card">
    <h2>Existing Agents</h2>
    <table class="table">
        <tr><th>Username</th><th>Name</th><th>Phone</th></tr>
        {% for a in agents %}
        <tr><td>{{ a.username }}</td><td>{{ a.full_name or "" }}</td><td>{{ a.phone or "" }}</td></tr>
        {% endfor %}
    </table>
</div>
{% endblock %}
