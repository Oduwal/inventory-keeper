<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>{{ title if title else "Inventory Keeper" }}</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="container topbar-inner">
        <div class="brand">
          <a href="/">
            <span class="logo"></span>
            <span>Inventory Keeper</span>
            <span class="badge">Netflix Theme</span>
          </a>
        </div>
        <nav class="nav">
          <a href="/items">Items</a>
          <a href="/transactions/new">Stock In/Out</a>
          <a href="/low-stock">Low Stock</a>
          <a href="/import">Import</a>
        </nav>
      </div>
    </header>

    <main class="container">
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
